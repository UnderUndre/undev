# Root-level compose stub.
# The actual stack lives in devops-app/ — kept here so `server-deploy.sh`
# (which expects compose at the app's remotePath) can be pointed at the repo
# root when the operator wants the deploy script to operate from the git root
# (e.g. for the `undev` application that points at /home/underundre/undev).
#
# Build contexts inside the included file remain relative to devops-app/, so
# nothing actually moves on disk.
include:
  - devops-app/docker-compose.yml
