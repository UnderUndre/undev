name: CI

on:
  push:
    branches: [main]
    paths:
      - "devops-app/**"
  pull_request:
    branches: [main]
    paths:
      - "devops-app/**"

defaults:
  run:
    working-directory: devops-app

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: devops-app/package-lock.json

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: devops-app/package-lock.json

      - run: npm ci
      - run: npm test
