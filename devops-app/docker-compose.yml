services:
  devops-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ..
      dockerfile: devops-app/Dockerfile
    depends_on:
      devops-db:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/data/logs
      - ${SSH_KEY_DIR:-~/.ssh}:/app/.ssh:ro
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD}@devops-db:5432/${POSTGRES_DB:-dashboard}
      - DASHBOARD_KEY=${DASHBOARD_KEY:?required}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - NODE_ENV=production
    networks:
      - default
      - caddy
    restart: unless-stopped

volumes:
  pgdata:

networks:
  caddy:
    external: true
    name: ai-twins-network
